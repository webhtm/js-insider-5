}

function hslToRgb(h, s, l) {
  h = h % 360;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const mm = l - c / 2;
  let r, g, b;
  if (h < 60) { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else { r = c; g = 0; b = x; }
  return {
    r: Math.round((r + mm) * 255),
    g: Math.round((g + mm) * 255),
    b: Math.round((b + mm) * 255)
  };
}

function rgbToHsv(r, g, b) {
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0, s = 0, v = max, d = max - min;
  if (d) {
    s = d / max;
    if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h /= 6;
  }
  return { h: h * 360, s, v };
}
function hsvToRgb(h, s, v) {
  h /= 360; let r, g, b;
  const i = Math.floor(h * 6), f = h * 6 - i;
  const p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
  switch (i % 6) {
    case 0: r = v; g = t; b = p; break;
    case 1: r = q; g = v; b = p; break;
    case 2: r = p; g = v; b = t; break;
    case 3: r = p; g = q; b = v; break;
    case 4: r = t; g = p; b = v; break;
    case 5: r = v; g = p; b = q; break;
  }
  return { r: Math.round(r * 255), g: Math.round(g * 255), b: Math.round(b * 255) };
}
function rgbToHex(r, g, b, a = 1) {
  const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
  if (a < 1) return hex + Math.round(a * 255).toString(16).padStart(2, '0').toUpperCase();
  return hex;
}

function updateSlidersBackground() {
  const modal = document.getElementById('custom-color-modal');
  if (!modal) return;
  const grayRgb = hsvToRgb(hue, 0, val / 100);
  const fullSatRgb = hsvToRgb(hue, 1, val / 100);
  const satGrad = `linear-gradient(to right, rgb(${grayRgb.r},${grayRgb.g},${grayRgb.b}), rgb(${fullSatRgb.r},${fullSatRgb.g},${fullSatRgb.b}))`;
  const fullValRgb = hsvToRgb(hue, sat / 100, 1);
  const valGrad = `linear-gradient(to right, #000, rgb(${fullValRgb.r},${fullValRgb.g},${fullValRgb.b}))`;
  const cur = hsvToRgb(hue, sat / 100, val / 100);
  const alphaGrad = `linear-gradient(to right, rgba(${cur.r},${cur.g},${cur.b},0), rgba(${cur.r},${cur.g},${cur.b},1))`;
  modal.style.setProperty('--sat-grad', satGrad);
  modal.style.setProperty('--val-grad', valGrad);
  modal.style.setProperty('--alpha-grad', alphaGrad);
}

function updatePreviewAndHex() {
  const rgb = hsvToRgb(hue, sat / 100, val / 100);
  const hex = rgbToHex(rgb.r, rgb.g, rgb.b, alpha);
  const swatch = document.getElementById('live-color-swatch');
  swatch.style.setProperty('--swatch-color',
    alpha < 1 ? `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})` : hex);
  document.getElementById('hex-input').value = hex;
}

function initColorPickerListeners() {
  const hueS = document.getElementById('hue-slider');
  const satS = document.getElementById('sat-slider');
  const valS = document.getElementById('val-slider');
  const alphaS = document.getElementById('alpha-slider');
  const hexI = document.getElementById('hex-input');
  if (!hueS || !satS || !valS || !alphaS) return;

  hueS.oninput = e => { hue = +e.target.value; updateSlidersBackground(); updatePreviewAndHex(); };
  satS.oninput = e => { sat = +e.target.value; updateSlidersBackground(); updatePreviewAndHex(); };
  valS.oninput = e => { val = +e.target.value; updateSlidersBackground(); updatePreviewAndHex(); };
  alphaS.oninput = e => { alpha = +e.target.value; updateSlidersBackground(); updatePreviewAndHex(); };

  hexI.oninput = e => {
    const value = e.target.value.trim();
    if (!/^#[0-9a-fA-F]{3,8}$/.test(value)) return;
    const parsed = parseColorToHsv(value);
    hue = parsed.h; sat = parsed.s * 100;
    val = parsed.v * 100;
    alpha = parsed.alpha;
    document.getElementById('hue-slider').value = hue;
    document.getElementById('sat-slider').value = sat;
    document.getElementById('val-slider').value = val;
    document.getElementById('alpha-slider').value = alpha;
    updateSlidersBackground();
    updatePreviewAndHex();
  };
}

document.getElementById('change-color-btn').onclick = function() {
  hideContextMenu();
  const modal = document.getElementById('custom-color-modal');
  const parsed = parseColorToHsv(window.currentColorValue || "#ff0000");
  hue = parsed.h; sat = parsed.s * 100; val = parsed.v * 100; alpha = parsed.alpha;
  document.getElementById('hue-slider').value = hue;
  document.getElementById('sat-slider').value = sat;
  document.getElementById('val-slider').value = val;
  document.getElementById('alpha-slider').value = alpha;
  updateSlidersBackground();
  updatePreviewAndHex();
  modal.style.display = 'block';
  centerWindow(modal);
  makeDraggable(modal);
};

window.applyCustomColor = function() {
  const hex = document.getElementById('hex-input').value.trim();
  if (!hex || !window.currentColorRange) {
    document.getElementById('custom-color-modal').style.display = 'none';
    return;
  }
  editor.session.replace(window.currentColorRange, hex);
  editor.focus();
  document.getElementById('custom-color-modal').style.display = 'none';
  window.currentColorRange = null;
  showToast("Color updated");
};
window.closeColorPicker = function() {
  document.getElementById('custom-color-modal').style.display = 'none';
  window.currentColorRange = null;
};

setTimeout(initColorPickerListeners, 200);
setTimeout(() => document.querySelectorAll('.draggable-window').forEach(makeDraggable), 300);

</script>
