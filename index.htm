#hue-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 24px;                /* overall clickable area */
  background: transparent;
  outline: none;
  margin: 10px 0;
  cursor: pointer;
}
/* === TRACK (the rainbow gradient) === */
#hue-slider::-webkit-slider-runnable-track {
  -webkit-appearance: none;
  height: 12px;
  background: linear-gradient(
    to right,
    rgb(255, 0, 0),      /* red    */
    rgb(255, 255, 0),    /* yellow */
    rgb(0, 255, 0),      /* green  */
    rgb(0, 255, 255),    /* cyan   */
    rgb(0, 0, 255),      /* blue   */
    rgb(255, 0, 255),    /* magenta */
    rgb(255, 0, 0)       /* red again */
  );
  border-radius: 9999px;
  box-shadow: 
    inset 0 2px 4px rgba(0, 0, 0, 0.2),
    0 1px 2px rgba(0, 0, 0, 0.1);
}
#hue-slider::-moz-range-track {
  height: 12px;
  background: linear-gradient(
    to right,
    rgb(255, 0, 0),
    rgb(255, 255, 0),
    rgb(0, 255, 0),
    rgb(0, 255, 255),
    rgb(0, 0, 255),
    rgb(255, 0, 255),
    rgb(255, 0, 0)
  );
  border-radius: 9999px;
  box-shadow: 
    inset 0 2px 4px rgba(0, 0, 0, 0.2);
}
/* === THUMB (the handle) === */
#hue-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 24px;
  height: 24px;
  background: white;
  border: none;
  border-radius: 50%;
  
  margin-top: -6px;   /* centers it on the track */
  cursor: pointer;
}
#hue-slider::-moz-range-thumb {
  width: 24px;
  height: 24px;
  background: white;
  border: 3px solid #222;
  border-radius: 50%;
  
  cursor: pointer;
}
/* Optional: make thumb color match current hue (requires tiny JS) */
#hue-slider {
  --thumb-color: hsl(180, 100%, 50%);
}
#hue-slider::-webkit-slider-thumb {
  background: var(--thumb-color);
  border-color: #222;
}
#hue-slider::-moz-range-thumb {
  background: var(--thumb-color);
}

    // Auto-switch header icons to black when top bar is light (accessibility)
// ==================== FIXED & IMPROVED ICON COLOR UPDATER ====================
// ==================== FIXED HEADER ICON COLOR UPDATER (works both ways) ====================
function updateHeaderIconColors() {
  const topBar = document.getElementById('top-bar');
  if (!topBar) return;

  const color = window.getComputedStyle(topBar).backgroundColor;
  const rgb = color.match(/\d+/g);
  if (!rgb || rgb.length < 3) return;

  const brightness = (parseInt(rgb[0]) * 299 + parseInt(rgb[1]) * 587 + parseInt(rgb[2]) * 114) / 1000;
  const newColor = brightness > 180 ? '#000000' : '#ffffff';

  // Target every header button SVG
  document.querySelectorAll('.header-btn svg').forEach(svg => {
    // Force on the <svg> element itself
    svg.setAttribute('fill', newColor);
    svg.setAttribute('stroke', newColor);

    // Force every child element (path, line, circle, etc.)
    svg.querySelectorAll('path, line, circle, rect, polyline, polygon').forEach(el => {
      // Remove any old inline styles that might be stuck
      el.removeAttribute('style');

      if (el.hasAttribute('fill') && el.getAttribute('fill') !== 'none') {
        el.setAttribute('fill', newColor);
      }
      if (el.hasAttribute('stroke') && el.getAttribute('stroke') !== 'none') {
        el.setAttribute('stroke', newColor);
      }
    });
  });

  // Extra safety for the hamburger sidebar icon
  const hamburgerSVG = document.querySelector('#hide-sidebar-btn svg');
  if (hamburgerSVG) {
    hamburgerSVG.setAttribute('fill', newColor);
    hamburgerSVG.setAttribute('stroke', newColor);
  }
}

    // Initialize IndexedDB
    function initIndexedDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('JSInsiderDB', 2);
       
        request.onerror = () => {
          console.error('IndexedDB error:', request.error);
          reject(request.error);
        };
       
        request.onsuccess = () => {
          db = request.result;
          console.log('IndexedDB initialized successfully');
          loadSavedFilesList();
          loadAllFilesFromDB();
          loadSettingsFromDB();
          resolve(db);
        };
       
        request.onupgradeneeded = (event) => {
          db = event.target.result;
          if (!db.objectStoreNames.contains('files')) {
            const objectStore = db.createObjectStore('files', { keyPath: 'filename' });
            objectStore.createIndex('filename', 'filename', { unique: true });
          }
          if (!db.objectStoreNames.contains('settings')) {
            db.createObjectStore('settings', { keyPath: 'key' });
          }
        };
      });
    }
    
    // Load settings from IndexedDB
    async function loadSettingsFromDB() {
      if (!db) return;
     
      const transaction = db.transaction(['settings'], 'readonly');
      const objectStore = transaction.objectStore('settings');
     
      const keys = [
        'topBarColor', 'editorTheme', 'editorFontSize', 'editorFontFamily',
        'wordWrap', 'tabSize', 'autoSaveInterval', 'showLineNumbers',
        'enableAutocomplete', 'useSoftTabs', 'showPrintMargin', 'highlightActiveLine',
        'highlightSelectedWord', 'showInvisibles', 'showFoldWidgets', 'fadeFoldWidgets',
        'highlightGutterLine', 'indentedSoftWrap', 'navigateWithinSoftTabs', 'enableMultiselect',
        'scrollPastEnd', 'fixedWidthGutter', 'printMarginColumn', 'newLineMode',
        'useWorker', 'enableEmmet', 'keyboardHandler', 'maxLines',
        'minLines', 'overwrite', 'readOnly', 'sidebarWidth',
        'defaultLanguage', 'autoPairBrackets'
      ];
     
      const requests = keys.map(key => objectStore.get(key));
     
      Promise.all(requests.map(req => new Promise((res) => { req.onsuccess = () => res(req.result?.value); })))
        .then(values => {
          const settings = {};
          keys.forEach((key, index) => {
            settings[key] = values[index] !== undefined ? values[index] : getDefaultSetting(key);
          });
          applySettings(settings);
        });
    }
    function getDefaultSetting(key) {
      const defaults = {
        topBarColor: '#0b487e',
        editorTheme: 'monokai',
        editorFontSize: 14,
        editorFontFamily: 'monospace',
        wordWrap: 'off',
        tabSize: 4,
        autoSaveInterval: 2000,
        showLineNumbers: true,
        enableAutocomplete: true,
        useSoftTabs: true,
        showPrintMargin: false,
        highlightActiveLine: true,
        highlightSelectedWord: true,
        showInvisibles: false,
        showFoldWidgets: true,
        fadeFoldWidgets: false,
        highlightGutterLine: true,
        indentedSoftWrap: true,
        navigateWithinSoftTabs: false,
        enableMultiselect: true,
        scrollPastEnd: 0.5,
        fixedWidthGutter: false,
        printMarginColumn: 80,
        newLineMode: 'auto',
        useWorker: true,
        enableEmmet: false,
        keyboardHandler: '',
        maxLines: 0,
        minLines: 0,
        overwrite: false,
        readOnly: false,
        sidebarWidth: 250,
        defaultLanguage: 'javascript',
        autoPairBrackets: true
      };
      return defaults[key];
    }
    // Save setting to IndexedDB
    function saveSetting(key, value) {
      if (!db) return;
     
      const transaction = db.transaction(['settings'], 'readwrite');
      const objectStore = transaction.objectStore('settings');
      objectStore.put({ key, value });
    }
    // Apply settings to UI and editor
    function applySettings(settings) {
      document.getElementById('top-bar-color').value = settings.topBarColor;

      document.getElementById('editor-theme').value = settings.editorTheme;

      document.getElementById('editor-font-size').value = settings.editorFontSize;
      editor.setFontSize(`${settings.editorFontSize}px`);
     
      document.getElementById('editor-font-family').value = settings.editorFontFamily;
      document.getElementById('code-editor').style.fontFamily = settings.editorFontFamily;
     
      document.getElementById('word-wrap').value = settings.wordWrap;
      editor.session.setUseWrapMode(settings.wordWrap !== 'off');
      editor.session.setWrapLimitRange(settings.wordWrap === 'wordWrapColumn' ? 80 : null);
     
      document.getElementById('tab-size').value = settings.tabSize;
      editor.session.setTabSize(settings.tabSize);
     
      document.getElementById('auto-save-interval').value = settings.autoSaveInterval;
      autoSaveDelay = settings.autoSaveInterval;
     
      document.getElementById('show-line-numbers').checked = settings.showLineNumbers;
      editor.renderer.setShowGutter(settings.showLineNumbers);
     
      document.getElementById('enable-autocomplete').checked = settings.enableAutocomplete;
      editor.setOptions({
        enableBasicAutocompletion: settings.enableAutocomplete,
        enableSnippets: settings.enableAutocomplete,
        enableLiveAutocompletion: settings.enableAutocomplete
      });
     
      document.getElementById('use-soft-tabs').checked = settings.useSoftTabs;
      editor.session.setUseSoftTabs(settings.useSoftTabs);
     
      document.getElementById('show-print-margin').checked = settings.showPrintMargin;
      editor.setShowPrintMargin(settings.showPrintMargin);
     
      document.getElementById('highlight-active-line').checked = settings.highlightActiveLine;
      editor.setHighlightActiveLine(settings.highlightActiveLine);
     
      document.getElementById('highlight-selected-word').checked = settings.highlightSelectedWord;
      editor.setHighlightSelectedWord(settings.highlightSelectedWord);
     
      document.getElementById('show-invisibles').checked = settings.showInvisibles;

      document.getElementById('show-fold-widgets').checked = settings.showFoldWidgets;

      document.getElementById('fade-fold-widgets').checked = settings.fadeFoldWidgets;

      document.getElementById('highlight-gutter-line').checked = settings.highlightGutterLine;

      document.getElementById('indented-soft-wrap').checked = settings.indentedSoftWrap;
      editor.renderer.setOption('indentedSoftWrap', settings.indentedSoftWrap);
     
      document.getElementById('navigate-within-soft-tabs').checked = settings.navigateWithinSoftTabs;
      editor.session.setNavigateWithinSoftTabs(settings.navigateWithinSoftTabs);
     
      document.getElementById('enable-multiselect').checked = settings.enableMultiselect;
      editor.setOption('enableMultiselect', settings.enableMultiselect);
     
      document.getElementById('scroll-past-end').value = settings.scrollPastEnd;
      editor.setOption('scrollPastEnd', settings.scrollPastEnd);
     
      document.getElementById('fixed-width-gutter').checked = settings.fixedWidthGutter;
      editor.renderer.setOption('fixedWidthGutter', settings.fixedWidthGutter);
     
      document.getElementById('print-margin-column').value = settings.printMarginColumn;

      document.getElementById('new-line-mode').value = settings.newLineMode;
      editor.session.setNewLineMode(settings.newLineMode);
     
      document.getElementById('use-worker').checked = settings.useWorker;
      editor.session.setUseWorker(settings.useWorker);
     
      document.getElementById('enable-emmet').checked = settings.enableEmmet;
      editor.setOption('enableEmmet', settings.enableEmmet);
     
      document.getElementById('keyboard-handler').value = settings.keyboardHandler;
      editor.setKeyboardHandler(settings.keyboardHandler);
     
      document.getElementById('max-lines').value = settings.maxLines || '';
      editor.setOption('maxLines', settings.maxLines || Infinity);
     
      document.getElementById('min-lines').value = settings.minLines || '';

      editor.setReadOnly(settings.readOnly);

      // For new files, set mode to defaultLanguage
     
      document.getElementById('auto-pair-brackets').checked = settings.autoPairBrackets;
      editor.setBehavioursEnabled(settings.autoPairBrackets);
    }
    // Load all files from IndexedDB into memory
    function loadAllFilesFromDB() {
      if (!db) return;
     
      const transaction = db.transaction(['files'], 'readonly');
      const objectStore = transaction.objectStore('files');
      const request = objectStore.getAll();
     
      request.onsuccess = () => {
        const dbFiles = request.result;
        dbFiles.forEach(fileData => {
          files[fileData.filename] = fileData.content;
          savedFiles.add(fileData.filename);
          lastSaveContent[fileData.filename] = fileData.content;
         
          if (fileData.autoSave) {
            autoSaveFiles.add(fileData.filename);
          }
        });
       
        updateFileExplorer();
       
        const fileNames = Object.keys(files);
        if (fileNames.length > 0) {
          openFile(fileNames[0]);
        }
      };
    }
    // Load list of saved files from IndexedDB
    function loadSavedFilesList() {
      if (!db) return;
     
      const transaction = db.transaction(['files'], 'readonly');
      const objectStore = transaction.objectStore('files');
      const request = objectStore.getAllKeys();
     
      request.onsuccess = () => {
        savedFiles.clear();
        request.result.forEach(filename => savedFiles.add(filename));
        updateFileExplorer();
      };
    }
    // Auto-save function
    function autoSaveFile(filename, content) {
      if (!db || !autoSaveFiles.has(filename) || !filename) return;
     
      if (lastSaveContent[filename] === content) return;
     
      showAutosaveIndicator('Saving...', 'saving');
     
      saveFileToIndexedDB(filename, content, true)
        .then(() => {
          lastSaveContent[filename] = content;
          showAutosaveIndicator('Auto-saved');
        })
        .catch(error => {
          console.error('Auto-save error:', error);
          showAutosaveIndicator('Save failed', 'error');
        });
    }
    // Save file to IndexedDB
    function saveFileToIndexedDB(filename, content, isAutoSave = false) {
      if (!db) return Promise.reject('IndexedDB not available');
     
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(['files'], 'readwrite');
        const objectStore = transaction.objectStore('files');
       
        const fileData = {
          filename: filename,
          content: content,
          autoSave: autoSaveFiles.has(filename),
          lastModified: new Date().toISOString()
        };
       
        const request = objectStore.put(fileData);
       
        request.onsuccess = () => {
          savedFiles.add(filename);
          updateFileExplorer();
          updateSaveButtons();
          if (!isAutoSave) {
            console.log(`File ${filename} saved to IndexedDB`);
          }
          resolve();
        };
       
        request.onerror = () => {
          console.error('Error saving file to IndexedDB:', request.error);
          reject(request.error);
        };
      });
    }
    // Remove file from IndexedDB
    function removeFileFromIndexedDB(filename) {
      if (!db) return Promise.reject('IndexedDB not available');
     
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(['files'], 'readwrite');
        const objectStore = transaction.objectStore('files');
        const request = objectStore.delete(filename);
       
        request.onsuccess = () => {
          savedFiles.delete(filename);
          autoSaveFiles.delete(filename);
          delete lastSaveContent[filename];
          if (files.hasOwnProperty(filename)) {
            delete files[filename];
            if (currentFile === filename) {
              currentFile = null;
              editor.setValue("");
            }
          }
          updateFileExplorer();
          updateSaveButtons();
          console.log(`File ${filename} removed from IndexedDB`);
          resolve();
        };
       
        request.onerror = () => {
          console.error('Error removing file from IndexedDB:', request.error);
          reject(request.error);
        };
      });
    }
    // Load file from IndexedDB
    function loadFileFromIndexedDB(filename) {
      if (!db) return Promise.reject('IndexedDB not available');
     
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(['files'], 'readonly');
        const objectStore = transaction.objectStore('files');
        const request = objectStore.get(filename);
       
        request.onsuccess = () => {
          if (request.result) {
            resolve(request.result);
          } else {
            reject('File not found in IndexedDB');
          }
        };
       
        request.onerror = () => {
          console.error('Error loading file from IndexedDB:', request.error);
          reject(request.error);
        };
      });
    }
    // Update save/remove buttons based on current file status
    function updateSaveButtons() {
  const saveBtn = document.getElementById('save-to-db-btn');
  const removeBtn = document.getElementById('remove-from-db-btn');
  const checkbox = document.getElementById('enable-indexeddb');

  if (!currentFile) {
    saveBtn.style.display = 'none';
    removeBtn.style.display = 'none';
    checkbox.disabled = true;
    return;
  }

  checkbox.disabled = false;
  checkbox.checked = autoSaveFiles.has(currentFile);

  const isInDB = savedFiles.has(currentFile);

  if (autoSaveFiles.has(currentFile)) {
    saveBtn.style.display = 'none';
    removeBtn.style.display = 'block';
  } else {
    saveBtn.style.display = 'block';
    saveBtn.textContent = isInDB ? 'Update in DB' : 'Save to DB';
    removeBtn.style.display = isInDB ? 'block' : 'none';
  }
}
    // Save current file content before switching
    function saveCurrentFile() {
      if (currentFile && files.hasOwnProperty(currentFile)) {
        const content = editor.getValue();
        files[currentFile] = content;
       
        if (autoSaveFiles.has(currentFile) && autoSaveTimeout) {
          clearTimeout(autoSaveTimeout);
        }
       
        if (autoSaveFiles.has(currentFile)) {
          autoSaveTimeout = setTimeout(() => {
            autoSaveFile(currentFile, content);
          }, autoSaveDelay);
        }
      }
    }
    // Function to update file explorer
    function updateFileExplorer() {
      const fileList = document.getElementById("file-list");
      fileList.innerHTML = "";
      Object.keys(files).sort().forEach(file => { // Sorted alphabetically for better UX
        const li = document.createElement("li");
        li.textContent = file;
        li.className = "file-item";
       
        if (savedFiles.has(file)) {
          li.classList.add("saved");
        }
       
        if (file === currentFile) {
          li.classList.add("selected");
        }
       
        li.onclick = () => openFile(file);
        fileList.appendChild(li);
      });
      updateSaveButtons();
    }
    // Function to open a file and highlight the selected one
    function openFile(filename) {
      saveCurrentFile();
     
      currentFile = filename;
     
      if (!files.hasOwnProperty(filename)) {
        files[filename] = "";
      }
     
      editor.setValue(files[filename], -1); // Move cursor to start
      editor.clearSelection();
      highlightFile(filename);
      setEditorMode(filename);
      updateSaveButtons();
    }
    // Function to highlight the selected file
    function highlightFile(filename) {
      const fileListItems = document.querySelectorAll("#file-list .file-item");
      fileListItems.forEach(item => {
        item.classList.remove("selected");
        if (item.textContent === filename) {
          item.classList.add("selected");
        }
      });
    }
    // Function to get editor mode based on file extension
    function getEditorModeFromExtension(filename) {
      const extension = filename.split('.').pop().toLowerCase();
     
      switch (extension) {
        case 'js':
        case 'jsx':
          return "javascript";
        case 'html':
        case 'htm':
          return "html";
        case 'css':
          return "css";
        case 'json':
          return "json";
        case 'xml':
          return "xml";
        case 'md':
        case 'markdown':
          return "markdown";
        case 'py':
          return "python";
        case 'java':
          return "java";
        case 'c':
          return "c_cpp";
        case 'cpp':
        case 'cc':
        case 'cxx':
          return "c_cpp";
        case 'php':
          return "php";
        case 'rb':
          return "ruby";
        case 'go':
          return "golang";
        case 'rs':
          return "rust";
        case 'ts':
        case 'tsx':
          return "typescript";
        case 'sql':
          return "sql";
        case 'sh':
        case 'bash':
          return "sh";
        case 'yaml':
        case 'yml':
          return "yaml";
        case 'txt':
        default:
          return "text";
      }
    }
    // Function to set the editor mode based on the file extension
    function setEditorMode(filename) {
      const mode = getEditorModeFromExtension(filename);
      editor.session.setMode(`ace/mode/${mode}`);
    }
    // Event listener for new file button (sidebar)
    document.getElementById("new-file-btn").onclick = () => {
      const filename = prompt("Enter new file name:");
      if (filename && filename.trim()) {
        const trimmedFilename = filename.trim();
        if (files.hasOwnProperty(trimmedFilename)) {
          alert("File already exists!");
          return;
        }
        saveCurrentFile();
        files[trimmedFilename] = "";
        updateFileExplorer();
        openFile(trimmedFilename);
      }
    };
    // Event listener for new file header button
    document.getElementById("new-file-header-btn").onclick = document.getElementById("new-file-btn").onclick;
    // Event listener for rename file button
    document.getElementById("rename-file-btn").onclick = () => {
  if (!currentFile) return alert("No file selected!");
  const newFilename = prompt("Enter new file name", currentFile);
  if (!newFilename || newFilename.trim() === currentFile) return;
  const trimmed = newFilename.trim();
  if (files.hasOwnProperty(trimmed)) return alert("File already exists!");

  saveCurrentFile();
  files[trimmed] = files[currentFile];
  delete files[currentFile];

  if (savedFiles.has(currentFile)) {
    removeFileFromIndexedDB(currentFile).then(() => {
      if (autoSaveFiles.has(trimmed)) autoSaveFile(trimmed, files[trimmed]);
    });
  }
  if (autoSaveFiles.has(currentFile)) {
    autoSaveFiles.delete(currentFile);
    autoSaveFiles.add(trimmed);
  }
  savedFiles.delete(currentFile);           // ← fixed
  currentFile = trimmed;
  updateFileExplorer();
  highlightFile(trimmed);
  setEditorMode(trimmed);
};

      if (remaining.length > 0) {

document.getElementById('enable-indexeddb').addEventListener('change', function(e) {
  if (!currentFile) return;

  if (e.target.checked) {
    // Turn ON auto-save
    autoSaveFiles.add(currentFile);

    // If file is NOT yet in DB, save it now
    if (!savedFiles.has(currentFile)) {
      saveCurrentFile();
      saveFileToIndexedDB(currentFile, files[currentFile]);
    } else {
      // Already in DB → just enable auto-save from now on
      autoSaveFile(currentFile, files[currentFile]);
    }
  } else {
    // Turn OFF auto-save → DO NOT delete from DB (only stop auto-saving)
    autoSaveFiles.delete(currentFile);
    showAutosaveIndicator('Auto-save disabled (file stays in DB)');
  }

  updateSaveButtons();
});

    function loadDBFilesModal() {
  const dbFileList = document.getElementById('db-file-list');
  dbFileList.innerHTML = '';

  // === DELETE ALL BUTTON (top of modal) ===
  

  // Attach Delete All listener
  document.getElementById('delete-all-db-btn').onclick = () => {
    if (confirm("Delete all files from DB?\nThis cannot be undone and won't affect temporary files")) {
      const tx = db.transaction(['files'], 'readwrite');
      const store = tx.objectStore('files');
      store.clear().onsuccess = () => {
        savedFiles.clear();
        autoSaveFiles.clear();
        updateFileExplorer();
        loadDBFilesModal(); // refresh list
        showToast('All DB files deleted', 'success');
      };
    }
  };

  // Populate file list with ICON buttons
  const transaction = db.transaction(['files'], 'readonly');
  const objectStore = transaction.objectStore('files');
  const request = objectStore.getAll();

  request.onsuccess = () => {
    const dbFiles = request.result.sort((a, b) => a.filename.localeCompare(b.filename));

    dbFiles.forEach(fileData => {
      const li = document.createElement('li');
      li.style.display = 'flex';
      li.style.justifyContent = 'space-between';
      li.style.alignItems = 'center';
      li.style.padding = '10px';
      li.style.borderBottom = '1px solid #444';
      li.style.cursor = 'pointer';
      li.dataset.filename = fileData.filename;

      li.innerHTML = `
        <span style="flex:1; overflow:hidden; text-overflow:ellipsis;">${fileData.filename}<br>
          <small style="color:#888;">Last modified: ${fileData.lastModified}</small>
        </span>
        <div style="display:flex; gap:8px;">
          <!-- Download Icon -->
          <button class="db-download-btn" style="background:#3498db; border:none; width:36px; height:36px; border-radius:6px; padding:0; display:flex; align-items:center; justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18h14v2H5v-2z"/></svg>
          </button>
          <!-- Delete Icon -->
          <button class="db-delete-btn" style="background:#e74c3c; border:none; width:36px; height:36px; border-radius:6px; padding:0; display:flex; align-items:center; justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          </button>
        </div>
      `;

      // Double-click to open
      li.onclick = () => {
        loadAndOpenDBFile(fileData.filename);
        document.getElementById('db-files-modal').style.display = 'none';
      };

      // Icon button listeners
      li.querySelector('.db-download-btn').onclick = (e) => {
        e.stopImmediatePropagation();
        downloadDBFile(fileData.filename, fileData.content);
      };

      li.querySelector('.db-delete-btn').onclick = (e) => {
        e.stopImmediatePropagation();
        if (confirm(`Delete "${fileData.filename}" from DB permanently?`)) {
          removeFileFromIndexedDB(fileData.filename).then(() => {
            loadDBFilesModal();
          });
        }
      };

      dbFileList.appendChild(li);
    });

    if (dbFiles.length === 0) {
      dbFileList.innerHTML = '<li style="padding:15px; color:#888; text-align:center;">No files in IndexedDB</li>';
    }
  };

  document.getElementById('db-files-modal').style.display = 'flex';
}

          autoSaveFiles.add(filename);
        }
        lastSaveContent[filename] = fileData.content;
        updateFileExplorer();
        openFile(filename);
      }).catch(error => {
        console.error('Error loading DB file:', error);
        alert('Failed to load file from DB.');
      });

currentColorRange = null;

let currentAlpha = 1;

function parseColorToHsv(color) {
  color = (color || "#ff0000").trim().toLowerCase();
  let alpha = 1;
  if (color.startsWith('rgba')) {
    const m = color.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
    if (m) return { ...rgbToHsv(parseInt(m[1])/255, parseInt(m[2])/255, parseInt(m[3])/255), alpha: m[4] ? parseFloat(m[4]) : 1 };
  }
  if (color.startsWith('rgb')) {
    const m = color.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
    if (m) return { ...rgbToHsv(parseInt(m[1])/255, parseInt(m[2])/255, parseInt(m[3])/255), alpha: 1 };
  }
  if (color.startsWith('#')) {
    let hex = color.slice(1);
    if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
    if (hex.length === 8) alpha = parseInt(hex.slice(6),16)/255;
    return { ...hexToHsv('#'+hex.slice(0,6)), alpha };
  }
  return { h:0, s:1, v:1, alpha:1 };
}

function rgbToHsv(r,g,b) {
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h=0,s=0,v=max;
  const d = max-min;
  if (d) {
    s = d/max;
    if (max===r) h = (g-b)/d + (g<b?6:0);
    else if (max===g) h = (b-r)/d + 2;
    else h = (r-g)/d + 4;
    h /= 6;
  }
  return {h:h*360, s, v};
}

function hexToHsv(hex) { return rgbToHsv(...hex.match(/\w\w/g).map(x=>parseInt(x,16)/255)); }

function hsvToRgb(h,s,v) {
  h /= 360; s /= 100; v /= 100;
  let r,g,b;
  const i = Math.floor(h*6), f = h*6-i;
  const p = v*(1-s), q = v*(1-f*s), t = v*(1-(1-f)*s);
  switch(i%6){
    case 0:r=v;g=t;b=p;break; case 1:r=q;g=v;b=p;break; case 2:r=p;g=v;b=t;break;
    case 3:r=p;g=q;b=v;break; case 4:r=t;g=p;b=v;break; case 5:r=v;g=p;b=q;break;
  }
  return {r:Math.round(r*255),g:Math.round(g*255),b:Math.round(b*255)};
}

function rgbToHex(r,g,b,a=1) {
  const hex = [r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('').toUpperCase();
  return a<1 ? '#' + hex + Math.round(a*255).toString(16).padStart(2,'0').toUpperCase() : '#' + hex;
}

// Draw canvas
function drawColorCanvas() {
  const canvas = document.getElementById('color-canvas');
  const ctx = canvas.getContext('2d');
  const hue = parseFloat(document.getElementById('hue-slider').value);
  const w = canvas.width = 220, h = canvas.height = 220;
  ctx.clearRect(0,0,w,h);
  for (let x=0; x<w; x++) {
    const sat = x/w;
    const grad = ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0, `hsl(${hue},${sat*100}%,100%)`);
    grad.addColorStop(1, `hsl(${hue},${sat*100}%,0%)`);
    ctx.fillStyle = grad;
    ctx.fillRect(x,0,1,h);
  }
  const px = currentSat * w;
  const py = (1 - currentVal) * h;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(px,py,11,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fill();
}

  if (!isDraggingCanvas) return;

  currentVal = 1 - Math.max(0, Math.min(1, (e.clientY - rect.top) / canvas.height));
  drawColorCanvas();
  updateLivePreview();
}

    isDragging = true;
    offsetX = clientX - win.offsetLeft;
    offsetY = clientY - win.offsetTop;
    document.onmousemove = mouseMove;
    document.ontouchmove = touchMove;
    document.onmouseup = stopDrag;
    document.ontouchend = stopDrag;
  }

  function mouseMove(e) { if (isDragging) moveWindow(e.clientX, e.clientY); }

  function moveWindow(clientX, clientY) {
    let newLeft = clientX - offsetX;
    let newTop = clientY - offsetY;
    newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - win.offsetWidth - 10));
    newTop = Math.max(0, Math.min(newTop, window.innerHeight - win.offsetHeight - 10));
    win.style.left = newLeft + 'px';

  }

  function stopDrag() { isDragging = false; document.onmousemove = document.ontouchmove = null; }

// ==================== HELPER: ONLY REAL TOP-LEVEL HTML TAGS ====================
function findFirstRealHtmlTag(regex, content) {
  regex.lastIndex = 0;
  let match;

  while ((match = regex.exec(content)) !== null) {
    const pos = match.index;

    // Must NOT be inside comment, string, <script> block, or <style> block
    if (!isPositionInCommentOrString(pos, content) && 
        !isInsideScriptOrStyle(pos, content)) {
      return match;
    }
  }
  return null;
}

function isInsideScriptOrStyle(pos, content) {
  // Check if position is inside any <script> or <style> block
  const scriptRegex = /<script[^>]*>[\s\S]*?<\/script>/gi;
  const styleRegex = /<style[^>]*>[\s\S]*?<\/style>/gi;
  let m;

  scriptRegex.lastIndex = 0;
  while ((m = scriptRegex.exec(content)) !== null) {
    if (pos >= m.index && pos < m.index + m[0].length) return true;
  }

  styleRegex.lastIndex = 0;
  while ((m = styleRegex.exec(content)) !== null) {
    if (pos >= m.index && pos < m.index + m[0].length) return true;
  }
  return false;
}
// Checks if a position is inside HTML comment, JS comment, or string literal
function isPositionInCommentOrString(pos, content) {
    // HTML comment: <!-- ... -->
    const htmlRegex = /<!--[\s\S]*?-->/g;
    let m;
    htmlRegex.lastIndex = 0;
    while ((m = htmlRegex.exec(content)) !== null) {
        if (pos >= m.index && pos < m.index + m[0].length) return true;
    }
    // JS multi-line: /* ... */
    const multiJs = /\/\*[\s\S]*?\*\//g;
    multiJs.lastIndex = 0;
    while ((m = multiJs.exec(content)) !== null) {
        if (pos >= m.index && pos < m.index + m[0].length) return true;
    }
    // JS single-line: // ...
    const singleJs = /\/\/.*?(?=\n|$)/g;
    singleJs.lastIndex = 0;
    while ((m = singleJs.exec(content)) !== null) {
        if (pos >= m.index && pos < m.index + m[0].length) return true;
    }
    // Strings: "..." and '...' (handles escaped quotes too)
    const strRegex = /(["'])(?:(?=(\\?))\2.)*?\1/g;
    strRegex.lastIndex = 0;
    while ((m = strRegex.exec(content)) !== null) {
        if (pos >= m.index && pos < m.index + m[0].length) return true;
    }
    return false;
}

function insertScriptIntoFunction() {
    const funcInput = document.getElementById('target-func').value.trim();
    const codeToInsert = document.getElementById('script-code').value.trim();
    const insertPos = document.querySelector('input[name="insert-pos"]:checked').value;
    const errorDiv = document.getElementById('insert-error');
    errorDiv.style.display = 'none';
    
    if (!funcInput || !codeToInsert) {
        errorDiv.textContent = 'Both fields are required.';
        errorDiv.style.display = 'block';
        return;
    }
    
    let content = editor.getValue();
    // Smart regex: normal function or async function
    let regex = new RegExp(`(async\\s+)?function\\s+${funcInput.replace(/[\(\)]/g, '\\$&')}\\s*\\(`, 'i');
    let match = content.match(regex);
    
    if (!match) {
        // Try without "function" keyword if user typed just name()
        regex = new RegExp(`\\b${funcInput.replace(/[\(\)]/g, '\\$&')}\\s*\\(`, 'i');
        match = content.match(regex);
    }
    
    if (!match) {
        errorDiv.textContent = `Function "${funcInput}" not found.`;
        errorDiv.style.display = 'block';
        return;
    }
    
    // Check async mismatch
    const isAsyncInCode = match[1] ? true : false;
    const userTypedAsync = funcInput.toLowerCase().includes('async');
    if (userTypedAsync !== isAsyncInCode) {
        if (!confirm(`You typed "${userTypedAsync ? 'async' : 'normal'}", but found ${isAsyncInCode ? 'async' : 'normal'} function.\nContinue anyway?`)) {
            return;
        }
    }
    
    // Find the closing } of the function (last one before next function)
    const startIdx = match.index + match[0].length;
    let braceCount = 0;
    let endIdx = startIdx;
    for (let i = startIdx; i < content.length; i++) {
        if (content[i] === '{') braceCount++;
        if (content[i] === '}') {
            braceCount--;
            if (braceCount === 0) {
                endIdx = i;
                break;
            }
        }
    }
    
    const insertionPoint = insertPos === 'last' ? endIdx : startIdx + 1;
    const indent = '    '; // safe indent
    
    content = content.slice(0, insertionPoint) + '\n' + indent + codeToInsert + '\n' + content.slice(insertionPoint);
    
    editor.setValue(content);
    editor.gotoLine(editor.session.getDocument().indexToPosition(insertionPoint).row + 1);
    document.getElementById('goto-window').style.display = 'none';
}

 currentColorRange = null;

let hue   = 0;

function hsvToRgb(h, s, v) {
    h /= 360; s /= 100; v /= 100;
    let r, g, b;
    const i = Math.floor(h * 6);
    const f = h * 6 - i;
    const p = v * (1 - s);
    const q = v * (1 - f * s);
    const t = v * (1 - (1 - f) * s);
    switch (i % 6) {
        case 0: r=v; g=t; b=p; break;
        case 1: r=q; g=v; b=p; break;
        case 2: r=p; g=v; b=t; break;
        case 3: r=p; g=q; b=v; break;
        case 4: r=t; g=p; b=v; break;
        case 5: r=v; g=p; b=q; break;
    }
    return {
        r: Math.round(r*255),
        g: Math.round(g*255),
        b: Math.round(b*255)
    };
}
function rgbToHex(r, g, b, a = 1) {
    const hex = [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('').toUpperCase();
    if (a < 1) {
        const aa = Math.round(a * 255).toString(16).padStart(2,'0').toUpperCase();
        return '#' + hex + aa;
    }
    return '#' + hex;
}

    document.getElementById('val-slider').style.background = valBg;

  const posType = document.querySelector('input[name="div-insert-pos"]:checked').value;

  if (!selector || !codeToInsert) {

  let content = editor.getValue();
  const regex = new RegExp(`(<div[^>]*?(id|class)=["']?${selector.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}["']?[^>]*>)`, 'i');
  const match = content.match(regex);

function getCurrentMode() {
    const mode = editor.session.getMode().$id || '';
    const ext = (currentFile || '').split('.').pop().toLowerCase();
    if (mode.includes('html') || ext === 'html' || ext === 'htm') return 'html';
    if (mode.includes('javascript') || ext === 'js') return 'js';
    if (mode.includes('css') || ext === 'css') return 'css';
    return 'text';
}
function cleanCurrentFile() {
    const mode = getCurrentMode();
    let code = editor.getValue();
    let cleaned = code;
    if (mode === 'html') cleaned = html_beautify(code, { indent_size: 4 });
    else if (mode === 'js') cleaned = js_beautify(code, { indent_size: 4 });
    else if (mode === 'css') cleaned = css_beautify(code, { indent_size: 4 });
    else cleaned = html_beautify(code, { indent_size: 4 });
    editor.setValue(cleaned);
    showToast('Code cleaned & beautified');
}
function minifyCurrentFile() {
    const mode = getCurrentMode();
    let code = editor.getValue();
    let minified = code;
    if (mode === 'html') minified = html_beautify(code, { indent_size: 0 }).replace(/\n\s*/g, ' ');
    else if (mode === 'js') minified = js_beautify(code, { indent_size: 0 }).replace(/\n\s*/g, ' ');
    else if (mode === 'css') minified = css_beautify(code, { indent_size: 0 }).replace(/\n\s*/g, ' ');
    else minified = code.replace(/\s+/g, ' ').trim();
    editor.setValue(minified);
    showToast('Code minified');
}
function removeUnusedCSS() {
    const ext = (currentFile || '').split('.').pop().toLowerCase();
    if (!currentFile || (ext !== 'html' && ext !== 'htm')) {
        showToast('Unused CSS removal works only on .html and .htm files', 'error');
        return;
    }
    let code = editor.getValue();
    const styleRegex = /(<style[^>]*>)([\s\S]*?)(<\/style>)/gi;
    code = code.replace(styleRegex, (full, open, styleContent, close) => {
        let cleaned = styleContent;
        const ruleRegex = /([^{}]+?)\s*\{[\s\S]*?\}/g;
        let match;
        const kept = [];
        while ((match = ruleRegex.exec(styleContent)) !== null) {
            const selector = match[1].trim().split(',')[0].trim();
            if (selector.startsWith('@')) { kept.push(match[0]); continue; }
            const htmlWithoutStyle = code.replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '');
            if (new RegExp(selector.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i').test(htmlWithoutStyle)) {
                kept.push(match[0]);
            }
        }
        return open + kept.join('\n') + close;
    });
    editor.setValue(code);
    showToast('Unused CSS removed');
}

function removeUnusedJSFunctions() {
  let code = editor.getValue();
  const funcRegex = /function\s+([a-zA-Z_$][0-9a-zA-Z_$]*)\s*\(/g;
  let match;
  const functions = [];
  while ((match = funcRegex.exec(code)) !== null) functions.push(match[1]);

  let removed = 0;
  functions.forEach(name => {
    const callRegex = new RegExp('\\b' + name + '\\b', 'g');
    const calls = (code.match(callRegex) || []).length;
    if (calls <= 1) {
      const fullRegex = new RegExp('function\\s+' + name + '\\s*\\([^)]*\\)\\s*\\{[^}]*\\}', 'g');
      code = code.replace(fullRegex, '');
      removed++;
    }
  });
  editor.setValue(code.trim());
  showToast(`Removed ${removed} unused JS function(s)`);
}

    <button onclick="removeFunctionByName()" style="margin-top:20px; width:100%; background:#e74c3c; color:white; border:none; padding:12px; border-radius:6px;">
       Remove Function
    </button>
    <div id="remove-error" style="color:#e74c3c; margin-top:8px; display:none;"></div>
  `;

  // Default to first tab
  c1.style.display = 'block';
  c2.style.display = 'none';
  t1.classList.add('active');
  t2.classList.remove('active');

  t1.onclick = () => { switchGotoTab(1); };
  t2.onclick = () => { switchGotoTab(2); };

  win.style.left = '35%';
  win.style.top = '25%';
  win.style.display = 'block';
  makeDraggable(win);
}

// ==================== REPLACE FUNCTION (smart bracket handling) ====================
function replaceFunctionByName() {
  const name = document.getElementById('replace-func-name').value.trim();
  const newBody = document.getElementById('replace-func-body').value.trim();
  const errorDiv = document.getElementById('replace-error');

  if (!name || !newBody) {
    errorDiv.textContent = 'Function name and new body are required';
    errorDiv.style.display = 'block';
    return;
  }

  let code = editor.getValue();

  // Smart regex for all common function patterns
  const patterns = [
    new RegExp(`(async\\s+)?function\\s+${name}\\s*\\([^)]*\\)\\s*\\{([\\s\\S]*?)\\}`, 'g'),
    new RegExp(`(const|let|var)\\s+${name}\\s*=\\s*\\(?async\\s*\\)?\\s*\\([^)]*\\)\\s*=>\\s*\\{([\\s\\S]*?)\\}`, 'g'),
    new RegExp(`(const|let|var)\\s+${name}\\s*=\\s*function\\s*\\([^)]*\\)\\s*\\{([\\s\\S]*?)\\}`, 'g'),
    new RegExp(`\\b${name}\\s*=\\s*function\\s*\\([^)]*\\)\\s*\\{([\\s\\S]*?)\\}`, 'g')
  ];

  let replaced = false;

  for (let regex of patterns) {
    code = code.replace(regex, (fullMatch, prefix, oldBody) => {
      replaced = true;
      return fullMatch.replace(oldBody, `\n  ${newBody}\n`);
    });
    if (replaced) break;
  }

  if (replaced) {
    editor.setValue(code);
    document.getElementById('goto-window').style.display = 'none';
    showToast(`Function "${name}" replaced successfully`);
  } else {
    errorDiv.textContent = `Function "${name}" not found`;
    errorDiv.style.display = 'block';
  }
}

// ==================== REMOVE FUNCTION (smart bracket handling) ====================
function removeFunctionByName() {
  const name = document.getElementById('remove-func-name').value.trim();
  const errorDiv = document.getElementById('remove-error');

  if (!name) {
    errorDiv.textContent = 'Function name is required';
    errorDiv.style.display = 'block';
    return;
  }

  let code = editor.getValue();

  const patterns = [
    new RegExp(`(async\\s+)?function\\s+${name}\\s*\\([^)]*\\)\\s*\\{([\\s\\S]*?)\\}\\s*`, 'g'),
    new RegExp(`(const|let|var)\\s+${name}\\s*=\\s*\\(?async\\s*\\)?\\s*\\([^)]*\\)\\s*=>\\s*\\{([\\s\\S]*?)\\}\\s*`, 'g'),
    new RegExp(`(const|let|var)\\s+${name}\\s*=\\s*function\\s*\\([^)]*\\)\\s*\\{([\\s\\S]*?)\\}\\s*`, 'g'),
    new RegExp(`\\b${name}\\s*=\\s*function\\s*\\([^)]*\\)\\s*\\{([\\s\\S]*?)\\}\\s*`, 'g')
  ];

  let removed = false;

  for (let regex of patterns) {
    const newCode = code.replace(regex, '');
    if (newCode !== code) {
      code = newCode;
      removed = true;
      break;
    }
  }

  if (removed) {
    editor.setValue(code.trim());
    document.getElementById('goto-window').style.display = 'none';
    showToast(`Function "${name}" removed successfully`);
  } else {
    errorDiv.textContent = `Function "${name}" not found`;
    errorDiv.style.display = 'block';
  }
}


// Location jump functions
function jumpToTop() {
    editor.gotoLine(1, 0);
    document.getElementById('goto-window').style.display = 'none';
}

function jumpToEnd() {
    editor.gotoLine(editor.session.getLength(), 0);
    document.getElementById('goto-window').style.display = 'none';
}

function jumpToLineNumber() {
    const lineInput = document.getElementById('goto-line-input');
    const line = parseInt(lineInput.value);
    const status = document.getElementById('location-status');

    if (!line || line < 1 || line > editor.session.getLength()) {
        status.textContent = 'Invalid line number!';
        return;
    }

    editor.gotoLine(line, 0);
    document.getElementById('goto-window').style.display = 'none';
    status.textContent = '';
}

    });

    if (db) {

        const store = tx.objectStore('settings');
